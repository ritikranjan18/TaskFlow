<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h1>⚡ TaskFlow</h1>
      <p class="sub">Team Task Manager</p>

      <div class="auth-tabs">
        <button class="active" onclick="showTab('login')">Login</button>
        <button onclick="showTab('register')">Register</button>
      </div>

      <div id="errorMsg" class="error-msg hidden"></div>

      <!-- Login Form -->
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@email.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPass" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Login</button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="hidden">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="regName" placeholder="John Doe" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="you@email.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPass" placeholder="Min 6 characters" required />
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="regRole">
            <option value="member">Member</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Create Account</button>
      </form>
    </div>
  </div>

  <script>
    const API = "/api";

    // Redirect if already logged in
    if (localStorage.getItem("token")) window.location.href = "/dashboard.html";

    function showTab(tab) {
      document.getElementById("loginForm").classList.toggle("hidden", tab !== "login");
      document.getElementById("registerForm").classList.toggle("hidden", tab !== "register");
      document.getElementById("errorMsg").classList.add("hidden");
      document.querySelectorAll(".auth-tabs button").forEach((b, i) => {
        b.classList.toggle("active", (i === 0 && tab === "login") || (i === 1 && tab === "register"));
      });
    }

    function showError(msg) {
      const el = document.getElementById("errorMsg");
      el.textContent = msg;
      el.classList.remove("hidden");
    }

    // Login
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      try {
        const res = await fetch(`${API}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.getElementById("loginEmail").value,
            password: document.getElementById("loginPass").value,
          }),
        });
        const data = await res.json();
        if (!res.ok) return showError(data.message);
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data));
        window.location.href = "/dashboard.html";
      } catch {
        showError("Server error. Please try again.");
      }
    });

    // Register
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      try {
        const res = await fetch(`${API}/auth/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name:     document.getElementById("regName").value,
            email:    document.getElementById("regEmail").value,
            password: document.getElementById("regPass").value,
            role:     document.getElementById("regRole").value,
          }),
        });
        const data = await res.json();
        if (!res.ok) return showError(data.message);
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data));
        window.location.href = "/dashboard.html";
      } catch {
        showError("Server error. Please try again.");
      }
    });
  </script>
</body>
</html>
